<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Matin Store - Fixed Navigation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --main: #0088cc; --red: #d9534f; --aba: #005f91; --orange: #ff9900; }
        body { font-family: 'Khmer OS Battambang', Arial; background: #f4f7f6; margin: 0; padding-bottom: 120px; }
        .header { background: linear-gradient(135deg, var(--main), var(--aba)); color: white; text-align: center; padding: 15px; position: sticky; top: 0; z-index: 1000; }
        .container { padding: 12px; max-width: 600px; margin: auto; }
        
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .product-card { background: white; border-radius: 15px; padding: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .product-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; }
        .price { color: var(--red); font-weight: bold; font-size: 18px; margin: 8px 0; display: block; }
        
        .btn-group { display: flex; flex-direction: column; gap: 6px; }
        .btn-buy { background: var(--orange); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-cart { background: #e7f3ff; color: var(--main); border: 1px solid var(--main); padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .float-group { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 2000; }
        .float-btn { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; text-decoration: none; border: none; }
        .bg-telegram { background: #0088cc; }
        .bg-cart { background: var(--aba); width: 65px; height: 65px; position: relative; }
        .badge { position: absolute; top: 0; right: 0; background: var(--red); width: 22px; height: 22px; border-radius: 50%; font-size: 11px; display: flex; align-items: center; justify-content: center; border: 2px solid white; font-weight: bold; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 3000; align-items: flex-end; }
        .modal-content { background: white; width: 100%; border-radius: 25px 25px 0 0; padding: 20px; max-height: 85vh; overflow-y: auto; box-sizing: border-box; }
        .cart-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #eee; }
        .cart-item-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; border: 1px solid #eee; }
        .qty-box { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
        .qty-btn { width: 28px; height: 28px; border: 1px solid #ddd; background: #fff; border-radius: 5px; cursor: pointer; }
        
        .order-form input, .order-form textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-family: inherit; }
        .pay-btn { width: 100%; padding: 16px; background: var(--aba); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; }
        .pay-btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="header"><h3>🏪 Matin Store</h3></div>

<div class="container">
    <div id="productGrid" class="product-grid"></div>
</div>

<div class="float-group">
    <a href="https://t.me/Matintopup168" target="_blank" class="float-btn bg-telegram">
        <i class="fab fa-telegram-plane fa-2x"></i>
    </a>
    <button class="float-btn bg-cart" onclick="openCart()">
        <i class="fas fa-shopping-cart fa-lg"></i>
        <div class="badge" id="cartBadge">0</div>
    </button>
</div>

<div class="modal" id="cartModal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 style="margin:0">🛒កន្ត្រាក់អីវ៉ាន់របស់អ្នក</h3>
            <span onclick="closeCart()" style="font-size:30px; cursor:pointer; color:#ccc;">&times;</span>
        </div>
        <div id="cartList"></div>
        <div style="display:flex; justify-content:space-between; padding:15px 0; font-weight:bold; border-top:2px dashed #eee; margin-top:10px;">
            <span>សរុប៖</span> <span id="totalPrice" style="color:var(--red); font-size:20px;">$0.00</span>
        </div>
        <div class="order-form">
            <input type="text" id="custName" placeholder="👤 ឈ្មោះរបស់អ្នក">
            <input type="number" id="custPhone" placeholder="📞 លេខទូរសព្ទ">
            <textarea id="custAddr" rows="2" placeholder="📍 អាសយដ្ឋានដឹកជញ្ជូន"></textarea>
            <button class="pay-btn" id="btnSubmit" onclick="processOrder()">បង់ប្រាក់</button>
        </div>
    </div>
</div>

<script>
    const BOT_TOKEN = '8095729462:AAEUHFYgZpnXReMyW8bElbEdNQ36Y7SQkRo';
    const MY_ID = '1643504321';
    const GROUP_ID = '-100xxxxxxxxx'; 

    const products = [
        { id: 1, name: "ដៃបាញ់ហ្គេម01", price: 5.00, img: "photo_6136671215972715559_y.jpg" },
        { id: 2, name: "Keyboard gaming", price: 16.00, img: "photo_6163286655859624935_y.jpg" },
        { id: 3, name: "ស្រោមដៃលេងហ្គេម", price: 3.00, img: "photo_6136671215972715556_y.jpg" },
        { id: 4, name: "កង្ហារត្រជាក់01", price: 15.00, img: "IMG_2119595465501475.jpeg" },
        { id: 5, name: "កង្ហារត្រជាក់02", price: 8.00, img: "received_937872772061987.jpeg" },
        { id: 6, name: "ដៃជំនួយការបាញ់", price: 19.00, img: "photo_6136671215972715553_y.jpg" },
        { id: 7, name: "ដៃបាញ់ហ្គេម02", price: 5.00, img: "photo_6136671215972715557_y.jpg" },
        { id: 8, name: "Keyboard", price: 25.00, img: "photo_6136671215972715322_y.jpg" }
    ];

    // ប្រើ localStorage ដើម្បីកុំឱ្យបាត់ទិន្នន័យពេល Refresh
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    function render() {
        document.getElementById('productGrid').innerHTML = products.map(p => `
            <div class="product-card">
                <img src="${p.img}" class="product-img">
                <div style="font-size:14px; font-weight:bold; margin:10px 0;">${p.name}</div>
                <span class="price">$${p.price.toFixed(2)}</span>
                <div class="btn-group">
                    <button class="btn-buy" onclick="quickBuy(${p.id})">ទិញភ្លាមៗ</button>
                    <button class="btn-cart" onclick="addToCart(${p.id})">ដាក់កន្ត្រក</button>
                </div>
            </div>
        `).join('');
        updateBadge();
    }

    function updateBadge() { document.getElementById('cartBadge').innerText = cart.reduce((s,i)=>s+i.qty, 0); }
    function saveCart() { localStorage.setItem('cart', JSON.stringify(cart)); updateBadge(); }
    
    function addToCart(id) {
        const p = products.find(x=>x.id===id);
        const inCart = cart.find(x=>x.id===id);
        if(inCart) inCart.qty++; else cart.push({...p, qty:1});
        saveCart();
        Swal.fire({ icon:'success', title:'បានបន្ថែម', timer:700, showConfirmButton:false });
    }

    function quickBuy(id) { addToCart(id); openCart(); }

    // --- មុខងារការពារការចុច Back ហើយលោតចេញពីវេបសាយ ---
    function openCart() { 
        renderCart(); 
        document.getElementById('cartModal').style.display = 'flex';
        // បន្ថែម State ទៅក្នុង History ដើម្បីឱ្យពេលគេចុច Back វាបិទតែកន្ត្រក
        history.pushState({ modalOpen: true }, '');
    }

    function closeCart() { 
        document.getElementById('cartModal').style.display = 'none';
        // ប្រសិនបើកន្ត្រកបិទដោយចុចប៊ូតុង X យើងត្រូវដក State ចេញវិញ
        if (history.state && history.state.modalOpen) {
            history.back();
        }
    }

    // ចាប់យកព្រឹត្តិការណ៍ចុចប៊ូតុង Back លើទូរសព្ទ
    window.onpopstate = function(event) {
        document.getElementById('cartModal').style.display = 'none';
    };

    function renderCart() {
        let total = 0;
        const list = document.getElementById('cartList');
        if(cart.length === 0) { list.innerHTML = "<p style='text-align:center; color:#999;'>កន្ត្រកទំនេរ...</p>"; return; }
        list.innerHTML = cart.map(item => {
            total += (item.price * item.qty);
            return `
                <div class="cart-item">
                    <img src="${item.img}" class="cart-item-img">
                    <div style="flex:1">
                        <div style="font-weight:bold; font-size:14px;">${item.name}</div>
                        <div class="qty-box">
                            <button class="qty-btn" onclick="updateQty(${item.id},-1)">-</button>
                            <span style="font-weight:bold; width:20px; text-align:center;">${item.qty}</span>
                            <button class="qty-btn" onclick="updateQty(${item.id},1)">+</button>
                            <i class="fas fa-trash-alt" style="color:#ddd; margin-left:10px; cursor:pointer;" onclick="removeFromCart(${item.id})"></i>
                        </div>
                    </div>
                    <div style="font-weight:bold; color:var(--red);">$${(item.price*item.qty).toFixed(2)}</div>
                </div>`;
        }).join('');
        document.getElementById('totalPrice').innerText = `$${total.toFixed(2)}`;
    }

    function updateQty(id, amt) {
        const item = cart.find(x=>x.id===id);
        if(item) { item.qty += amt; if(item.qty <= 0) return removeFromCart(id); }
        saveCart(); renderCart();
    }
    function removeFromCart(id) { cart = cart.filter(x=>x.id!==id); saveCart(); renderCart(); }

    async function processOrder() {
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        const addr = document.getElementById('custAddr').value.trim();
        const total = document.getElementById('totalPrice').innerText;
        const btn = document.getElementById('btnSubmit');

        if(!name || !phone || !addr || cart.length === 0) return Swal.fire('បំពេញព័ត៌មានឱ្យអស់','','warning');

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> កំពុងបញ្ជូន...';

        let itemsText = cart.map(i => `📦 ${i.name} (x${i.qty})`).join('\n');
        let msg = `🔔 <b>កម្មង់ថ្មី!</b>\n👤 ឈ្មោះ៖ ${name}\n📞 ទូរសព្ទ៖ ${phone}\n📍 អាសយដ្ឋាន៖ ${addr}\n\n🛒 <b>ទំនិញ៖</b>\n${itemsText}\n\n💰 <b>សរុប៖ ${total}</b>`;

        const telegramUrl = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        const payload = (id) => ({
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: id, text: msg, parse_mode: 'HTML' })
        });

        // បាញ់ទិន្នន័យចេញភ្លាមៗ
        fetch(telegramUrl, payload(MY_ID));
        fetch(telegramUrl, payload(GROUP_ID));

        setTimeout(() => {
            cart = [];
            saveCart();
            window.location.href = `https://pay.ababank.com/oRF8/du83nu9t?amount=${total.replace('$','')}`;
        }, 100); 
    }

    window.onload = render;
</script>
</body>
</html>
